backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "assets/images"

collections:

  # ── Homepage ──────────────────────────────────────────────
  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "_data/homepage.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Main Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Button Text", name: "button_text", widget: "string" }
              - { label: "Desktop Banner Image", name: "desktop_image", widget: "image", hint: "Large background image shown on desktop" }
              - { label: "Mobile Banner Image", name: "mobile_image", widget: "image", hint: "Background image shown on mobile devices" }
          - label: "Our Services Section"
            name: "services_section"
            widget: "object"
            fields:
              - { label: "Section Heading", name: "heading", widget: "string" }
              - label: "Service Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Service Title", name: "title", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Link (page#section)", name: "link", widget: "string" }
          - label: "Discover Beauty Section"
            name: "about_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Top Photo", name: "image_top", widget: "image", hint: "Right-side top frame image" }
              - { label: "Bottom Photo", name: "image_bottom", widget: "image", hint: "Right-side bottom frame image" }
              - label: "Feature List"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "item", widget: "string" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
          - label: "Why Choose Us Section"
            name: "why_choose"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "How It Works Section"
            name: "how_it_works"
            widget: "object"
            fields:
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Step Label", name: "label", widget: "string" }
          - label: "Enquiry / Contact Form Section"
            name: "enquiry"
            widget: "object"
            fields:
              - { label: "Section Heading", name: "heading", widget: "string" }
              - { label: "Name Field Placeholder", name: "placeholder_name", widget: "string", hint: "Placeholder text inside the Name field" }
              - { label: "Email Field Placeholder", name: "placeholder_email", widget: "string", hint: "Placeholder text inside the Email field" }
              - { label: "Phone Field Placeholder", name: "placeholder_phone", widget: "string", hint: "Placeholder text inside the Phone field" }
              - { label: "Message Field Placeholder", name: "placeholder_message", widget: "string", hint: "Placeholder text inside the Message box" }
              - { label: "Form Button Text", name: "button_text", widget: "string", hint: "Text on the submit button" }
              - label: "Service Dropdown Options"
                name: "services"
                widget: "list"
                hint: "Options shown in the Service dropdown on the form"
                field: { label: "Service Name", name: "item", widget: "string" }

  # ── About Us ──────────────────────────────────────────────
  - name: "about"
    label: "About Us Page"
    files:
      - name: "about"
        label: "About Us Content"
        file: "_data/about.json"
        fields:
          - { label: "Page Heading", name: "page_heading", widget: "string" }
          - label: "Founders"
            name: "founders"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
          - label: "Our Story"
            name: "story"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "item", widget: "text" }
          - label: "Mission & Values Cards"
            name: "values"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Why Choose Brow Loft"
            name: "why_choose"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "List Items"
                name: "items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

  # ── FAQ ───────────────────────────────────────────────────
  - name: "faq"
    label: "FAQ Page"
    files:
      - name: "faq"
        label: "FAQ Questions & Answers"
        file: "_data/faq.json"
        fields:
          - { label: "Page Heading", name: "page_heading", widget: "string" }
          - label: "FAQ Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

  # ── Policies ──────────────────────────────────────────────
  - name: "policies"
    label: "Policies Page"
    files:
      - name: "policies"
        label: "Policies Content"
        file: "_data/policies.json"
        fields:
          - { label: "Page Heading", name: "page_heading", widget: "string" }
          - label: "Cancellation Policy"
            name: "cancellation"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro Paragraph", name: "intro", widget: "text" }
              - { label: "Long Appointments Heading", name: "long_appointments_heading", widget: "string" }
              - label: "Long Appointments Items"
                name: "long_appointments_items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Short Appointments Heading", name: "short_appointments_heading", widget: "string" }
              - label: "Short Appointments Items"
                name: "short_appointments_items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Closing Note", name: "closing_note", widget: "text" }
          - label: "Parking & Payment"
            name: "parking_payment"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Langley Parking Heading", name: "langley_parking_heading", widget: "string" }
              - { label: "Langley Parking Description", name: "langley_parking", widget: "text" }
              - { label: "Burnaby Parking Heading", name: "burnaby_parking_heading", widget: "string" }
              - { label: "Burnaby Parking Description", name: "burnaby_parking", widget: "text" }
              - { label: "Parking Note", name: "parking_note", widget: "string" }
              - { label: "Payment Intro", name: "payment_intro", widget: "string" }
              - label: "Payment Methods"
                name: "payment_methods"
                widget: "list"
                field: { label: "Method", name: "item", widget: "string" }
              - { label: "Payment Closing", name: "payment_closing", widget: "string" }
          - label: "Service Considerations & Safety"
            name: "safety"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Lash Lift Heading", name: "lash_lift_heading", widget: "string" }
              - { label: "Lash Lift Intro", name: "lash_lift_intro", widget: "string" }
              - label: "Lash Lift Items"
                name: "lash_lift_items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Lash Lift Note", name: "lash_lift_note", widget: "text" }
              - { label: "Brow Tint Heading", name: "brow_tint_heading", widget: "string" }
              - { label: "Brow Tint Intro", name: "brow_tint_intro", widget: "string" }
              - label: "Brow Tint Items"
                name: "brow_tint_items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Brow Tint Note", name: "brow_tint_note", widget: "text" }
              - { label: "Closing", name: "closing", widget: "text" }

  # ── Before Your Appointment ───────────────────────────────
  - name: "before_appointment"
    label: "Before Your Appointment Page"
    files:
      - name: "before_appointment"
        label: "Before Appointment Content"
        file: "_data/before-appointment.json"
        fields:
          - { label: "Page Heading", name: "page_heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Card Title", name: "title", widget: "string" }
              - { label: "Intro Paragraph", name: "intro", widget: "text" }
              - { label: "Highlight 1 Heading", name: "highlight_1_heading", widget: "string", required: false, hint: "e.g. Why Choose Threading?" }
              - { label: "Highlight 1 Text", name: "highlight_1_text", widget: "text", required: false }
              - { label: "Highlight 2 Heading", name: "highlight_2_heading", widget: "string", required: false, hint: "e.g. Key Benefits" }
              - label: "Highlight 2 List Items"
                name: "highlight_2_items"
                widget: "list"
                required: false
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Highlight 1 Items Heading", name: "highlight_1_items_heading", widget: "string", required: false, hint: "e.g. Pre-Wax Checklist, Preparation Tips" }
              - label: "Highlight 1 List Items"
                name: "highlight_1_items"
                widget: "list"
                required: false
                field: { label: "Item", name: "item", widget: "string" }

  # ── After Care ────────────────────────────────────────────
  - name: "aftercare"
    label: "After Care Page"
    files:
      - name: "aftercare"
        label: "After Care Content"
        file: "_data/aftercare.json"
        fields:
          - { label: "Page Heading", name: "page_heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Care Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Card Title", name: "title", widget: "string" }
              - { label: "Intro Paragraph", name: "intro", widget: "text" }
              - { label: "Highlight Heading", name: "highlight_heading", widget: "string" }
              - label: "Highlight List Items"
                name: "highlight_items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - { label: "Closing Note", name: "closing_note", widget: "text" }

  # ── Langley Services ──────────────────────────────────────
  - name: "langley"
    label: "Langley Services"
    files:
      - name: "langley_services"
        label: "Langley Services & Prices"
        file: "_data/langley-services.json"
        fields:
          - label: "Service Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - label: "Services"
                name: "services"
                widget: "list"
                summary: "{{fields.name}} — {{fields.meta}}"
                fields:
                  - { label: "Service ID", name: "id", widget: "hidden" }
                  - { label: "Service Name", name: "name", widget: "string" }
                  - { label: "Duration", name: "meta", widget: "string", hint: "e.g. 20 min" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Button Text", name: "button_text", widget: "string", default: "Book Now" }
                  - { label: "Button Link", name: "button_link", widget: "string", default: "booking.html" }

  # ── Burnaby Services ──────────────────────────────────────
  - name: "burnaby"
    label: "Burnaby Services"
    files:
      - name: "burnaby_services"
        label: "Burnaby Services & Prices"
        file: "_data/burnaby-services.json"
        fields:
          - label: "Service Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - label: "Services"
                name: "services"
                widget: "list"
                summary: "{{fields.name}} — {{fields.meta}}"
                fields:
                  - { label: "Service ID", name: "id", widget: "hidden" }
                  - { label: "Service Name", name: "name", widget: "string" }
                  - { label: "Duration", name: "meta", widget: "string", hint: "e.g. 20 min" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Button Text", name: "button_text", widget: "string", default: "Book Now" }
                  - { label: "Button Link", name: "button_link", widget: "string", default: "booking.html" }

  # ── Booking Page ──────────────────────────────────────────
  - name: "booking"
    label: "Booking Page"
    files:
      - name: "booking"
        label: "Booking Services & Prices"
        file: "_data/booking.json"
        fields:
          - { label: "Location Section Heading", name: "location_heading", widget: "string" }
          - { label: "Location Section Subtitle", name: "location_subtitle", widget: "string" }
          - label: "Locations"
            name: "locations"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Icon Class", name: "icon", widget: "string", hint: "Font Awesome icon class, e.g. fas fa-map-marker-alt" }
              - { label: "Button Text", name: "button_text", widget: "string", default: "Select" }
              - { label: "Services Heading", name: "services_heading", widget: "string", hint: "e.g. Langley Services" }
              - { label: "Services Subtitle", name: "services_subtitle", widget: "string", hint: "e.g. Select the services you'd like to book at Langley." }
          - { label: "Continue Button Text", name: "continue_button", widget: "string", default: "Continue" }
          - { label: "Change Location Button Text", name: "change_location_button", widget: "string", default: "← Change Location" }
          - label: "Service Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - label: "Services"
                name: "services"
                widget: "list"
                summary: "{{fields.name}} — {{fields.duration}}"
                fields:
                  - { label: "Service ID", name: "id", widget: "hidden" }
                  - { label: "Service Name", name: "name", widget: "string" }
                  - { label: "Langley Price", name: "langley_price", widget: "string" }
                  - { label: "Burnaby Price", name: "burnaby_price", widget: "string" }
                  - { label: "Duration", name: "duration", widget: "string" }
          - label: "Sidebar Card"
            name: "sidebar"
            widget: "object"
            fields:
              - { label: "Business Logo", name: "logo", widget: "image", hint: "Logo displayed at the top of the sidebar" }
              - { label: "Business Name", name: "business_name", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Phone Number", name: "phone", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - label: "Social Links"
                name: "social"
                widget: "object"
                fields:
                  - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
                  - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
                  - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
                  - { label: "Pinterest URL", name: "pinterest", widget: "string", required: false }
              - { label: "Opening Hours Icon", name: "hours_icon", widget: "string", default: "fas fa-clock", hint: "Font Awesome icon class for hours section" }
              - label: "Opening Hours"
                name: "hours"
                widget: "list"
                summary: "{{fields.days}} — {{fields.time}}"
                fields:
                  - { label: "Days", name: "days", widget: "string", hint: "e.g. Monday - Friday" }
                  - { label: "Time", name: "time", widget: "string", hint: "e.g. 10:00 AM - 7:00 PM" }
              - { label: "Rating Stars", name: "rating_stars", widget: "number", default: 5, hint: "Number of stars to display (e.g. 5)" }
              - { label: "Rating Score", name: "rating_score", widget: "string", hint: "e.g. 4.9/5" }
              - { label: "Rating Label", name: "rating_label", widget: "string", hint: "e.g. from 500+ clients" }
          - label: "Team Selection Section"
            name: "team_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - label: "Team Members"
                name: "members"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Avatar Letter", name: "avatar", widget: "string", hint: "Single letter shown in the avatar circle, e.g. P or S" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }
                  - { label: "Button Text", name: "button_text", widget: "string", default: "Book" }
          - label: "Add-Ons Section"
            name: "addons_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Group Heading", name: "group_heading", widget: "string", hint: "e.g. Threading & Waxing" }
              - label: "Add-On Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}} — {{fields.price}}"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Duration", name: "duration", widget: "string", hint: "e.g. 15 mins" }
                  - { label: "Price", name: "price", widget: "string", hint: "e.g. $15" }
          - label: "Calendar Section"
            name: "calendar_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Select Date Label", name: "date_label", widget: "string", default: "Select Date" }
              - { label: "Select Time Label", name: "time_label", widget: "string", default: "Select Time" }
          - label: "Personal Details Section"
            name: "details_section"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Personal Info Heading", name: "personal_heading", widget: "string", default: "Personal Information" }
              - { label: "Additional Info Heading", name: "additional_heading", widget: "string", default: "Additional Information" }
              - { label: "Notes Placeholder", name: "notes_placeholder", widget: "string", default: "Any special requests or comments for your appointment..." }
              - { label: "Terms Text", name: "terms_text", widget: "string", default: "I agree to the booking terms and conditions" }
              - { label: "Submit Button Text", name: "submit_button", widget: "string", default: "Confirm Booking" }
              - { label: "Confirmation Message", name: "confirmation_message", widget: "string", default: "Your appointment has been booked successfully! Check your email for confirmation." }
          - label: "Booking Summary Labels"
            name: "summary_labels"
            widget: "object"
            fields:
              - { label: "Summary Icon", name: "icon", widget: "string", default: "fas fa-shopping-bag", hint: "Font Awesome icon class for summary title" }
              - { label: "Summary Title", name: "title", widget: "string", default: "Booking Summary" }
              - { label: "Location Label", name: "location", widget: "string", default: "Location" }
              - { label: "Services Label", name: "services", widget: "string", default: "Services" }
              - { label: "Empty Services Text", name: "empty_services", widget: "string", default: "No services selected" }
              - { label: "Team Label", name: "team", widget: "string", default: "Team" }
              - { label: "Add-ons Label", name: "addons", widget: "string", default: "Add-ons" }
              - { label: "Total Label", name: "total", widget: "string", default: "Total" }

  # ── Footer ────────────────────────────────────────────────
  - name: "footer"
    label: "Footer"
    files:
      - name: "footer"
        label: "Footer Content"
        file: "_data/site-settings.json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Copyright Text", name: "copyright", widget: "string" }
          - label: "Services List"
            name: "footer_services"
            widget: "list"
            hint: "Services shown in the footer column"
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Link", name: "link", widget: "string", hint: "e.g. langley-location.html#eyebrow-threading" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
              - { label: "Pinterest URL", name: "pinterest", widget: "string", required: false }

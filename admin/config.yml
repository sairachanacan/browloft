backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "langley"
    label: "Langley Services"
    files:
      - name: "langley_services"
        label: "Langley Services & Prices"
        file: "_data/langley-services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Service ID", name: "id", widget: "hidden" }
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Duration", name: "meta", widget: "string", hint: "e.g. 20 min" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $15" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }

  - name: "burnaby"
    label: "Burnaby Services"
    files:
      - name: "burnaby_services"
        label: "Burnaby Services & Prices"
        file: "_data/burnaby-services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Service ID", name: "id", widget: "hidden" }
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Duration", name: "meta", widget: "string", hint: "e.g. 20 min" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $20" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site_settings"
        label: "Contact Info & Social Links"
        file: "_data/site-settings.json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Copyright Text", name: "copyright", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
              - { label: "Pinterest URL", name: "pinterest", widget: "string", required: false }
